<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-Money - Quản Lý Hiệu Suất Đầu Tư</title>
    <!-- Nhúng thư viện Supabase CDN chính thức -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0f19; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-container { background-color: #151c2c; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); text-align: center; border: 1px solid #222f47; }
        .logo-icon { font-size: 40px; margin-bottom: 10px; }
        h2 { margin-bottom: 24px; font-weight: 600; font-size: 24px; letter-spacing: 0.5px; }
        .tabs { display: flex; background-color: #0b0f19; border-radius: 8px; padding: 4px; margin-bottom: 24px; border: 1px solid #222f47; }
        .tab-btn { flex: 1; padding: 10px; background: none; border: none; color: #7a8b9e; cursor: pointer; font-weight: 600; font-size: 14px; border-radius: 6px; transition: all 0.3s; }
        .tab-btn.active { background-color: #1e293b; color: #ffffff; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: #7a8b9e; margin-bottom: 8px; font-weight: 700; letter-spacing: 0.5px; }
        input { width: 100%; padding: 12px 16px; background-color: #1e293b; border: 1px solid #222f47; border-radius: 8px; color: #ffffff; font-size: 14px; transition: all 0.3s; }
        input:focus { outline: none; border-color: #d9a74a; box-shadow: 0 0 0 2px rgba(217, 167, 74, 0.2); }
        .submit-btn { width: 100%; padding: 14px; background-color: #d9a74a; border: none; border-radius: 8px; color: #0b0f19; font-weight: 700; font-size: 15px; cursor: pointer; transition: background-color 0.3s; margin-top: 10px; }
        .submit-btn:hover { background-color: #c59338; }
        .submit-btn:disabled { background-color: #555; color: #aaa; cursor: not-allowed; }
        .footer-links { margin-top: 20px; }
        .footer-links a { color: #7a8b9e; font-size: 13px; text-decoration: none; transition: color 0.3s; }
        .footer-links a:hover { color: #d9a74a; }
        .message { margin-top: 15px; font-size: 13px; min-height: 20px; }
        .error { color: #ef4444; }
        .success { color: #10b981; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-icon">💰</div>
        <h2>N-Money</h2>
        
        <div class="tabs">
            <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Đăng nhập</button>
            <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Đăng ký</button>
        </div>

        <form id="auth-form" onsubmit="handleAuthSubmit(event)">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="hainamlh@gmail.com" required>
            </div>
            
            <div class="input-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="••••••••••••" required>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">Đăng nhập</button>
        </form>

        <div class="message" id="message-box"></div>

        <div class="footer-links" id="forgot-password-link">
            <a href="#" onclick="handleForgotPassword(event)">Quên mật khẩu?</a>
        </div>
    </div>

    <script>
        // --- CHỈ KHỞI TẠO DUY NHẤT 1 BIẾN SUPABASE Ở ĐÂY ---
        // Thay thế URL và Key dự án của bạn vào đây
        const SB_URL = "https://your-supabase-url.supabase.co"; 
        const SB_KEY = "your-anon-key"; 

        let supabaseClientInstance = null;
        try {
            if (typeof supabase !== 'undefined' && supabase.createClient) {
                supabaseClientInstance = supabase.createClient(SB_URL, SB_KEY, {
                    auth: {
                        persistSession: true,
                        autoRefreshToken: true,
                        detectSessionInUrl: true,
                        storage: window.localStorage
                    }
                });
            }
        } catch (e) {
            console.error("Lỗi cấu hình Supabase:", e);
        }

        let currentMode = 'login';

        // --- CHUYỂN ĐỔI GIAO DIỆN ---
        function switchTab(mode) {
            currentMode = mode;
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');
            const submitBtn = document.getElementById('submit-btn');
            const forgotLink = document.getElementById('forgot-password-link');
            document.getElementById('message-box').innerText = '';

            if (mode === 'login') {
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
                submitBtn.innerText = 'Đăng nhập';
                forgotLink.style.display = 'block';
            } else {
                tabRegister.classList.add('active');
                tabLogin.classList.remove('active');
                submitBtn.innerText = 'Đăng ký tài khoản';
                forgotLink.style.display = 'none';
            }
        }

        // --- XỬ LÝ ĐĂNG NHẬP / ĐĂNG KÝ ---
        async function handleAuthSubmit(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const messageBox = document.getElementById('message-box');
            const submitBtn = document.getElementById('submit-btn');

            if (!supabaseClientInstance) {
                showMessage("Lỗi kết nối database! Vui lòng điền đúng URL và Key trong code.", "error");
                return;
            }

            submitBtn.disabled = true;
            messageBox.className = "message";
            messageBox.innerText = "Đang xử lý...";

            try {
                if (currentMode === 'login') {
                    const { data, error } = await supabaseClientInstance.auth.signInWithPassword({
                        email: email,
                        password: password,
                    });

                    if (error) throw error;

                    showMessage("Đăng nhập thành công! Đang tải dữ liệu...", "success");
                    setTimeout(() => {
                        window.location.href = "dashboard.html"; 
                    }, 1000);

                } else {
                    const { data, error } = await supabaseClientInstance.auth.signUp({
                        email: email,
                        password: password,
                    });

                    if (error) throw error;

                    if (data.user && data.user.identities && data.user.identities.length === 0) {
                        showMessage("Email này đã được đăng ký từ trước!", "error");
                    } else {
                        showMessage("Đăng ký thành công! Hãy kiểm tra hộp thư email (nếu hệ thống yêu cầu xác nhận).", "success");
                    }
                }
            } catch (error) {
                console.error("Lỗi:", error.message);
                showMessage(translateError(error.message), "error");
            } finally {
                submitBtn.disabled = false;
            }
        }

        // --- XỬ LÝ QUÊN MẬT KHẨU ---
        async function handleForgotPassword(event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showMessage("Nhập Email của bạn vào ô trống phía trên trước.", "error");
                return;
            }

            try {
                const { error } = await supabaseClientInstance.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/reset-password.html',
                });
                if (error) throw error;
                showMessage("Đã gửi link đặt lại mật khẩu vào Email.", "success");
            } catch (error) {
                showMessage(translateError(error.message), "error");
            }
        }

        function showMessage(text, type) {
            const messageBox = document.getElementById('message-box');
            messageBox.innerText = text;
            messageBox.className = `message ${type}`;
        }

        function translateError(msg) {
            if (msg.includes("Invalid login credentials")) return "Sai tài khoản hoặc mật khẩu.";
            if (msg.includes("User already registered")) return "Tài khoản email này đã tồn tại.";
            if (msg.includes("Password should be at least")) return "Mật khẩu yêu cầu ít nhất 6 ký tự.";
            return msg;
        }
    </script>
</body>
</html>
